# Development profile configuration.
# Local MySQL 8.4 + Redis 7.x via Docker Compose.

# ── Datasource ─────────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/achievement_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  # ── Classified Schema (D-39) ───────────────────────────────────────────
  datasource:
    classified:
      url: jdbc:mysql://localhost:3306/achievement_classified?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      username: root
      password: root123
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        minimum-idle: 2
        maximum-pool-size: 5
        idle-timeout: 300000
        max-lifetime: 1200000
        connection-timeout: 30000

  # ── Flyway ─────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # ── Redis ──────────────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

# ── MyBatis-Plus ──────────────────────────────────────────────────────────
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

# ── Resilience4j ──────────────────────────────────────────────────────────
resilience4j:
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
    instances:
      api-integration:
        base-config: default
