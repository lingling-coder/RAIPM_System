# Base application configuration shared by all modules.
# Module-specific overrides are in their own application.yml files.

spring:
  profiles:
    active: dev

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
