# Base application configuration shared by all modules.
# Module-specific overrides are in their own application.yml files.

spring:
  profiles:
    active: dev

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # ── Task Scheduling ──────────────────────────────────────────────────────
  task:
    scheduling:
      pool:
        size: 2

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# ── File Storage Configuration (D-29, D-30, D-31) ──────────────────────────
file:
  storage:
    upload-dir: ./uploads
    max-file-size: 52428800  # 50MB
    allowed-types: pdf,doc,docx,xls,xlsx,png,jpg,jpeg,gif,zip,rar

# ── Backup Configuration (D-32, D-33) ──────────────────────────────────────
backup:
  enabled: true
  backup-dir: ./backups
  database:
    host: localhost
    port: 3306
    username: root
    password: root123
    name: achievement_db
  retention-days: 30
  cron: 0 0 2 * * ?  # 2 AM daily
  file-backup-paths: ./uploads

# ── JWT Configuration ──────────────────────────────────────────────────────
jwt:
  secret: AchievementJWTSecretKeyForHMACSHA256LengthRequirement2024
  access-token-expiration: 7200000  # 2 hours in ms
  refresh-token-expiration: 604800000  # 7 days in ms
