<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">涉密核查提醒</title>
</head>
<body style="font-family: 'Microsoft YaHei', Arial, sans-serif; background-color: #f4f4f4; padding: 20px; margin: 0;">
    <table role="presentation" style="width: 100%; max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden;">
        <tr>
            <td style="background-color: #409eff; padding: 20px; text-align: center;">
                <h1 style="color: #ffffff; font-size: 18px; margin: 0;" th:text="${title}">涉密核查提醒</h1>
            </td>
        </tr>
        <tr>
            <td style="padding: 30px;">
                <p style="color: #333333; font-size: 15px; line-height: 1.6;" th:text="${body}">提醒内容</p>
                <div style="background-color: #f0f9ff; border-left: 4px solid #409eff; padding: 12px 16px; margin: 16px 0;">
                    <p style="margin: 4px 0; color: #606266; font-size: 14px;">
                        截止日期：<strong th:text="${deadline}" style="color: #e6a23c;">2026-07-01</strong>
                    </p>
                    <p style="margin: 4px 0; color: #606266; font-size: 14px;">
                        剩余天数：<strong th:text="${daysRemaining}" style="color: #e6a23c;">15</strong> 天
                    </p>
                </div>
                <p style="color: #999999; font-size: 12px; margin-top: 24px;">
                    此邮件由系统自动发送，请勿回复。如有疑问请联系科研秘书。
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
